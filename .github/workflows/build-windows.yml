name: Build Windows installer

on:
  push:
    branches: [main, "claude/python-mapping-software-eo6prk"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller pytest

      - name: Cache Natural Earth downloads
        uses: actions/cache@v4
        with:
          path: data/downloads
          key: naturalearth-${{ hashFiles('scripts/fetch_data.py') }}

      - name: Fetch map data
        run: python scripts/fetch_data.py

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Read version
        id: version
        run: |
          $v = python -c "import ezmaps; print(ezmaps.__version__)"
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build executable (PyInstaller)
        run: python -m PyInstaller packaging/ezmaps.spec --noconfirm

      - name: Smoke-test executable
        run: |
          if (-not (Test-Path "dist/EzMaps/EzMaps.exe")) {
            throw "EzMaps.exe was not produced"
          }
          if (-not (Test-Path "dist/EzMaps/_internal/data/shapes")) {
            throw "bundled map data missing"
          }

      - name: Build installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.version }} `
            packaging\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EzMaps-Setup-${{ steps.version.outputs.version }}
          path: dist/installer/EzMaps-Setup-*.exe
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/EzMaps-Setup-*.exe
